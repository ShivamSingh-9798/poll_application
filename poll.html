<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Poll</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --bar-bg: #edf2f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .poll-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        /* --- Voting View Styles --- */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 2px solid var(--bar-bg);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-label:hover {
            border-color: #cdd6df;
            background-color: #fcfcfc;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--primary);
        }

        /* Highlight selected option */
        .option-label:has(input:checked) {
            border-color: var(--primary);
            background-color: #f0f3ff;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #a0b0fa;
            cursor: not-allowed;
        }

        /* --- Results View Styles --- */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .result-percent {
            color: var(--text-muted);
            font-weight: 500;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: var(--bar-bg);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 6px;
            width: 0%; /* Set dynamically via JS */
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth animation */
        }

        .total-votes {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Small link to reset for testing */
        .reset-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #ff6b6b;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .reset-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="poll-container">
        <!-- View 1: Voting Form -->
        <div id="vote-view">
            <h2 id="poll-question-vote">Loading question...</h2>
            <div id="options-container" class="options-list">
                <!-- Radio buttons injected here -->
            </div>
            <button id="submit-vote-btn" disabled>Submit Vote</button>
        </div>

        <!-- View 2: Live Results -->
        <div id="results-view" class="hidden">
            <h2 id="poll-question-result">Loading question...</h2>
            <div id="results-container" class="results-list">
                <!-- Progress bars injected here -->
            </div>
            <div id="total-votes-display" class="total-votes">Total votes: 0</div>
            
            <a href="#" id="reset-poll-btn" class="reset-link">Reset Poll Data (For Testing)</a>
        </div>
    </div>

    <script>
        // 1. Initial Data Setup (Default state if no data exists)
        const defaultPollData = {
            question: "What is your favorite programming language for the web?",
            options: [
                { id: 'opt1', text: "JavaScript", votes: 0 },
                { id: 'opt2', text: "Python", votes: 0 },
                { id: 'opt3', text: "TypeScript", votes: 0 },
                { id: 'opt4', text: "PHP", votes: 0 }
            ]
        };

        // 2. DOM Elements
        const voteView = document.getElementById('vote-view');
        const resultsView = document.getElementById('results-view');
        const questionVoteDisplay = document.getElementById('poll-question-vote');
        const questionResultDisplay = document.getElementById('poll-question-result');
        const optionsContainer = document.getElementById('options-container');
        const resultsContainer = document.getElementById('results-container');
        const submitVoteBtn = document.getElementById('submit-vote-btn');
        const totalVotesDisplay = document.getElementById('total-votes-display');
        const resetBtn = document.getElementById('reset-poll-btn');

        let selectedOptionId = null;

        // 3. Core Functions
        
        // Fetch current data from Local Storage
        function getPollData() {
            const savedData = localStorage.getItem('realtimePollData');
            return savedData ? JSON.parse(savedData) : defaultPollData;
        }

        // Save data to Local Storage
        function savePollData(data) {
            localStorage.setItem('realtimePollData', JSON.stringify(data));
        }

        // Initialize the App
        function initApp() {
            const data = getPollData();
            questionVoteDisplay.textContent = data.question;
            questionResultDisplay.textContent = data.question;

            // Check if this specific browser has already voted
            const hasVoted = localStorage.getItem('userHasVoted') === 'true';

            if (hasVoted) {
                renderResultsView(data);
            } else {
                renderVoteView(data);
            }
        }

        // Render the Voting Form
        function renderVoteView(data) {
            voteView.classList.remove('hidden');
            resultsView.classList.add('hidden');
            optionsContainer.innerHTML = '';
            selectedOptionId = null;
            submitVoteBtn.disabled = true;

            data.options.forEach(option => {
                const label = document.createElement('label');
                label.className = 'option-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'poll-option';
                radio.value = option.id;
                
                radio.addEventListener('change', (e) => {
                    selectedOptionId = e.target.value;
                    submitVoteBtn.disabled = false; // Enable button when an option is selected
                });

                const textSpan = document.createElement('span');
                textSpan.textContent = option.text;

                label.appendChild(radio);
                label.appendChild(textSpan);
                optionsContainer.appendChild(label);
            });
        }

        // Handle Vote Submission
        submitVoteBtn.addEventListener('click', () => {
            if (!selectedOptionId) return;

            const data = getPollData();
            
            // Find the selected option and increment its vote count
            const selectedOption = data.options.find(opt => opt.id === selectedOptionId);
            if (selectedOption) {
                selectedOption.votes += 1;
            }

            // Save updated data
            savePollData(data);
            
            // Mark user as having voted
            localStorage.setItem('userHasVoted', 'true');

            // Switch to results view
            renderResultsView(data);
        });

        // Render the Live Results View
        function renderResultsView(data) {
            voteView.classList.add('hidden');
            resultsView.classList.remove('hidden');
            resultsContainer.innerHTML = '';

            // Calculate total votes
            const totalVotes = data.options.reduce((sum, opt) => sum + opt.votes, 0);
            totalVotesDisplay.textContent = `Total votes: ${totalVotes}`;

            // Sort options by most votes (optional, remove if you want fixed order)
            const sortedOptions = [...data.options].sort((a, b) => b.votes - a.votes);

            sortedOptions.forEach(option => {
                // Calculate percentage
                let percentage = 0;
                if (totalVotes > 0) {
                    percentage = Math.round((option.votes / totalVotes) * 100);
                }

                // Create Result HTML
                const itemDiv = document.createElement('div');
                itemDiv.className = 'result-item';

                itemDiv.innerHTML = `
                    <div class="result-header">
                        <span>${option.text}</span>
                        <span class="result-percent">${percentage}% (${option.votes} votes)</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 0%"></div>
                    </div>
                `;

                resultsContainer.appendChild(itemDiv);

                // Trigger animation by setting width slightly after element is added to DOM
                setTimeout(() => {
                    const fillBar = itemDiv.querySelector('.progress-bar-fill');
                    fillBar.style.width = `${percentage}%`;
                }, 50);
            });
        }

        // --- REAL-TIME SYNC MAGIC ---
        // This listens for changes made to Local Storage by OTHER browser tabs
        window.addEventListener('storage', (event) => {
            if (event.key === 'realtimePollData') {
                // If another tab voted, get the new data
                const newData = JSON.parse(event.newValue);
                
                // If we are currently on the results screen, update it live!
                if (!resultsView.classList.contains('hidden')) {
                    renderResultsView(newData);
                }
            }
        });

        // Reset Button (For testing purposes)
        resetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('realtimePollData');
            localStorage.removeItem('userHasVoted');
            initApp();
        });

        // Start the app!
        initApp();

    </script>
</body>
</html>
